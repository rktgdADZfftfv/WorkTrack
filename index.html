<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>WorkTrack</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

    <header class="topbar">

        <h1>WorkTrack</h1>

        <div class="searchBox">
            <input id="search" placeholder="Search worker..." oninput="searchWorker()">
        </div>

        <div class="salaryBox">
            Total Salary
            <span id="totalSalary">₹0</span>
        </div>

    </header>

    <section class="addWorker">

        <h2>Add Worker</h2>

        <input id="name" placeholder="Worker Name">
        <input id="address" placeholder="Address">
        <input id="date" type="date">
        <input id="salary" placeholder="Daily Salary">

        <button onclick="addWorker()">Add Worker</button>

    </section>

    <section class="workers">

        <h2>Workers</h2>

        <div id="workerList"></div>

    </section>

    <section>

        <h2 id="calendarTitle">Attendance</h2>

        <div id="calendar"></div>
<!-- 
        <h3 id="calendarTitle">📅 Attendance</h3>
        <div id="calendar"></div> -->

    </section>

    <section>

        <h2 id="chartTitle">Salary Graph</h2>

        <canvas id="chart"></canvas>
<!-- 
        <h3 id="chartTitle">📊 Salary Graph</h3>
        <canvas id="chart"></canvas> -->

    </section>
    

    <div class="bottomBar">

        <button onclick="downloadAll()" class="downloadBtn">
            Download All Reports
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
