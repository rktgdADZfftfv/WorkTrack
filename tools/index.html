<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>QRQuick – QR Tools</title>
    <meta name="description" content="Generate QR codes for text, WiFi, contact or uploaded files.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <!-- QR decoder library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>

<body>

    <div class="container">

        <h1>QRQuick</h1>
        <p>All QR Code Tools</p>

        <select id="type" onchange="showFields()">
            <option value="text">Text / URL QR</option>
            <option value="wifi">WiFi QR</option>
            <option value="contact">Contact QR</option>
            <option value="file">File Upload QR</option>
        </select>

        <!-- TEXT -->
        <div id="textField">
            <input type="text" id="textInput" placeholder="Enter text or link">
        </div>

        <!-- WIFI -->
        <div id="wifiField" style="display:none">
            <input type="text" id="ssid" placeholder="WiFi Name">
            <input type="text" id="password" placeholder="WiFi Password">
        </div>

        <!-- CONTACT -->
        <div id="contactField" style="display:none">
            <input type="text" id="name" placeholder="Contact Name">
            <input type="text" id="phone" placeholder="Phone Number">
        </div>

        <!-- FILE -->
        <div id="fileField" style="display:none">
            <input type="file" id="fileInput">
            <p class="note">Upload a file to generate a QR link.</p>
        </div>

        <button onclick="generateQR()">Generate QR</button>

        <div id="qrBox">
            <img id="qrImage">
        </div>

        <button onclick="downloadQR()">Download QR</button>

        <hr>

        <h3>QR Scanner</h3>

        <input type="file" id="qrUpload">
        <p id="scanResult"></p>

    </div>

    <script src="script.js"></script>

</body>

</html>
